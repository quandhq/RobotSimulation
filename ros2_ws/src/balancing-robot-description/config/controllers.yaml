controller_manager:
  ros__parameters:
    # This must be fast for a balancing robot. 
    # We set it to 400Hz to match the update_rate of your IMU sensor.
    update_rate: 400  

    # 1. The State Broadcaster (Reads from hardware)
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 2. The Command Controller (Writes to hardware)
    effort_controller:
      type: effort_controllers/JointGroupEffortController

# Configuration for the effort controller
effort_controller:
  ros__parameters:
    joints:
      - left_wheel_joint
      - right_wheel_joint